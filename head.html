<script nonce="aem" type="text/javascript">
function OptanonWrapper() {
  if (typeof window.RMOneTrustLoaded === 'undefined' || window.RMOneTrustLoaded !== true) {
    window.RMOneTrustLoaded = true;
    window.dispatchEvent(new Event('RMOneTrustLoaded'));
  }
}
</script>
